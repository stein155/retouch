name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "🚀 Features"
    labels: ["feature", "enhancement"]
  - title: "🐛 Bug Fixes"
    labels: ["fix", "bug"]
  - title: "🧰 Maintenance"
    labels: ["chore", "docs", "ci", "dependencies"]
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'
version-resolver:
  minor:
    labels: ["feature", "enhancement"]
  patch:
    labels: ["fix", "bug", "chore", "docs", "ci", "dependencies"]
  default: patch
template: |
  ## Changes

  $CHANGES

  ## Install / update

  Install or update wirelessly from your computer:

  ```sh
  curl -fsSL https://raw.githubusercontent.com/stein155/retouch/main/install/install.sh | sh
  ```
