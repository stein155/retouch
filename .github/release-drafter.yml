name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels: ['feature', 'enhancement']
  - title: '🐛 Bug Fixes'
    labels: ['fix', 'bug']
  - title: '🧰 Maintenance'
    labels: ['chore', 'docs', 'ci', 'dependencies']
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'
version-resolver:
  minor:
    labels: ['feature', 'enhancement']
  patch:
    labels: ['fix', 'bug', 'chore', 'docs', 'ci', 'dependencies']
  default: patch
template: |
  ## Changes

  $CHANGES

  ## Install / update

  Run from your computer (the speaker is configured wirelessly):

  ```sh
  ./install/install.sh <speaker-ip>
  ```
