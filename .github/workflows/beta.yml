name: Beta Build

# A beta is built ON DEMAND, never automatically. A maintainer comments `/beta`
# on a pull request and this builds that PR's code into an installable
# prerelease tagged `beta-pr-<n>`, whose assets match a normal release so the
# running app can fetch and install it over the air — no computer needed. Pick
# it in the app under Settings → Updates.
#
# The build runs via `issue_comment`, which executes in the BASE repo with a
# write token, so even a fork PR can publish a release. Two safeguards gate it:
# the comment must be `/beta`, and its author must be an OWNER / MEMBER /
# COLLABORATOR.
#
# CRITICAL: a PR's code is UNTRUSTED (a fork can put anything in package.json
# lifecycle scripts, a Vite plugin, etc.). So the work is split across two jobs:
#
#   build   — checks out the PR head and runs its build scripts, but with NO
#             write token and `contents: read` only. Even if the PR code is
#             hostile it can't reach a privileged token or tamper with releases.
#             The compiled assets are handed to the next job as artifacts.
#   publish — takes the write token but never checks out or runs PR code; it
#             only downloads the artifacts and publishes the prerelease.
#
# This keeps a `/beta` on a malicious PR from escalating a repo comment into a
# tampered release that every speaker would install as root.
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [closed]

permissions: {}

jobs:
  # Build the PR's code with NO token and read-only scope. Untrusted code runs
  # only here, where there is nothing privileged to steal.
  build:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/beta') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TAG: beta-pr-${{ github.event.issue.number }}
    steps:
      - name: Check out the PR head
        uses: actions/checkout@v7
        with:
          # The PR's head ref always exists in the base repo, including for forks.
          ref: refs/pull/${{ github.event.issue.number }}/head
          # Don't leave the (even read-only) checkout token in .git/config where
          # PR build scripts could pick it up.
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build web UI
        working-directory: frontend
        run: |
          npm ci
          npm run build   # outputs to ../internal/web/dist (embedded by go:embed)

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Cross-compile agent (armv7l)
        env:
          GOOS: linux
          GOARCH: arm
          GOARM: '7'
          CGO_ENABLED: '0'
        run: go build -ldflags "-s -w -X main.version=${TAG}" -o retouch-armv7l .

      - name: Checksums
        run: sha256sum retouch-armv7l > SHA256SUMS

      - name: Upload beta assets
        uses: actions/upload-artifact@v4
        with:
          name: beta-assets
          path: |
            retouch-armv7l
            SHA256SUMS
          if-no-files-found: error
          retention-days: 1

  # Publish the prerelease. Holds the write token but never runs PR code — it
  # only consumes the artifacts the build job produced.
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write       # publish the prerelease + tag
      pull-requests: write  # leave the install hint comment
      issues: write         # react to the triggering comment
    env:
      PR: ${{ github.event.issue.number }}
      TAG: beta-pr-${{ github.event.issue.number }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Acknowledge the request
        run: |
          gh api -X POST \
            "repos/$GITHUB_REPOSITORY/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content=rocket --silent || true

      - name: Download beta assets
        uses: actions/download-artifact@v4
        with:
          name: beta-assets

      - name: Resolve PR metadata
        id: pr
        run: |
          # The PR title is attacker-controlled (fork author). Emit it with a
          # random heredoc delimiter so a title containing newlines / "name=..."
          # can't inject extra step outputs. It is only ever consumed as an
          # action `with:` input below (never in a shell), so it can't execute.
          echo "sha=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR" --jq .head.sha)" >> "$GITHUB_OUTPUT"
          delim="TITLE_$(openssl rand -hex 16)"
          {
            echo "title<<$delim"
            gh api "repos/$GITHUB_REPOSITORY/pulls/$PR" --jq .title
            echo "$delim"
          } >> "$GITHUB_OUTPUT"

      # The tag we create must NOT point at the PR-head commit. GITHUB_TOKEN is a
      # GitHub App token, and GitHub refuses any ref it creates — branch OR tag,
      # via push, the Releases API, or the Git Refs API — when that ref points at
      # a commit which adds or modifies a `.github/workflows/*` file (App tokens
      # can't hold the `workflows` scope). A PR that touches the beta workflow
      # itself therefore can never be tagged at its head, which is exactly what
      # broke every previous approach with a 403.
      #
      # The tag's target commit is irrelevant to installs: the app resolves a
      # beta purely by its `beta-pr-<n>` tag name and downloads the attached
      # assets (see internal/web/web.go). So we anchor the tag to the base repo's
      # current default-branch commit (github.sha) — already on a branch and
      # introducing no workflow change, hence always taggable — while the assets
      # were built from the PR head in the build job. action-gh-release creates
      # the tag at target_commitish on first run and just refreshes the assets on
      # re-runs, so `/beta` stays idempotent.
      #
      # Pinned to a commit SHA (not a mutable tag): this action holds the write
      # token, so a retagged `v3` must not be able to silently change what runs.
      - name: Publish beta prerelease
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ env.TAG }}
          target_commitish: ${{ github.sha }}
          name: "PR #${{ env.PR }}: ${{ steps.pr.outputs.title }}"
          body: |
            Beta of PR #${{ env.PR }} (${{ steps.pr.outputs.title }})
            built from ${{ steps.pr.outputs.sha }} on a maintainer's `/beta` request.

            Install it from the app: **Settings → Updates → PR #${{ env.PR }}**.
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          files: |
            retouch-armv7l
            SHA256SUMS

      - name: Comment install hint
        run: |
          # --repo is required: this job never checks out the repo, so gh has no
          # git remote to infer it from and would fail with "not a git repository".
          gh pr comment "$PR" --repo "$GITHUB_REPOSITORY" --body "🧪 Beta built for this PR. On a speaker already running ReTouch, open the app → **Settings → Updates**, pick **PR #${PR}**, and update — no computer needed. Comment \`/beta\` again to rebuild after new pushes; the beta is removed when the PR closes."

  # Tear down the beta when the PR closes so stale prereleases don't pile up.
  cleanup:
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete the beta prerelease + tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: beta-pr-${{ github.event.number }}
        run: |
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes || \
            echo "no beta release for $TAG (nothing to clean up)"
