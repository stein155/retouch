name: Beta Build

# A beta is built ON DEMAND, never automatically. A maintainer comments `/beta`
# on a pull request and this builds that PR's code into an installable
# prerelease tagged `beta-pr-<n>`, whose assets match a normal release so the
# running app can fetch and install it over the air — no computer needed. Pick
# it in the app under Settings → Updates.
#
# The build runs via `issue_comment`, which executes in the BASE repo with a
# write token, so even a fork PR can publish a release. Because that token is
# privileged we require TWO things: the comment must be `/beta`, and its author
# must be an OWNER / MEMBER / COLLABORATOR. We then check out the PR head ref so
# we build exactly what the PR proposes — and only when a maintainer asks.
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [closed]

permissions:
  contents: write       # publish / delete the prerelease + tag
  pull-requests: write  # leave the install hint comment
  issues: write         # react to the triggering comment

jobs:
  # Build + publish the beta only when a trusted maintainer comments `/beta`.
  build:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/beta') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    env:
      PR: ${{ github.event.issue.number }}
      TAG: beta-pr-${{ github.event.issue.number }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Acknowledge the request
        run: |
          gh api -X POST \
            "repos/$GITHUB_REPOSITORY/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content=rocket --silent || true

      - name: Check out the PR head
        uses: actions/checkout@v7
        with:
          # The PR's head ref always exists in the base repo, including for forks.
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Resolve PR metadata
        id: pr
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "title=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR" --jq .title)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build web UI
        working-directory: frontend
        run: |
          npm ci
          npm run build   # outputs to ../internal/web/dist (embedded by go:embed)

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Cross-compile agent (armv7l)
        env:
          GOOS: linux
          GOARCH: arm
          GOARM: '7'
          CGO_ENABLED: '0'
        run: go build -ldflags "-s -w -X main.version=${TAG}" -o retouch-armv7l .

      - name: Checksums
        run: sha256sum retouch-armv7l > SHA256SUMS

      # The tag we create must NOT point at the PR-head commit. GITHUB_TOKEN is a
      # GitHub App token, and GitHub refuses any ref it creates — branch OR tag,
      # via push, the Releases API, or the Git Refs API — when that ref points at
      # a commit which adds or modifies a `.github/workflows/*` file (App tokens
      # can't hold the `workflows` scope). A PR that touches the beta workflow
      # itself therefore can never be tagged at its head, which is exactly what
      # broke every previous approach with a 403.
      #
      # The tag's target commit is irrelevant to installs: the app resolves a
      # beta purely by its `beta-pr-<n>` tag name and downloads the attached
      # assets (see internal/web/web.go). So we anchor the tag to the base repo's
      # current default-branch commit (github.sha) — already on a branch and
      # introducing no workflow change, hence always taggable — while the assets
      # are built from the PR head checked out above. action-gh-release creates
      # the tag at target_commitish on first run and just refreshes the assets on
      # re-runs, so `/beta` stays idempotent.
      - name: Publish beta prerelease
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          target_commitish: ${{ github.sha }}
          name: "PR #${{ env.PR }}: ${{ steps.pr.outputs.title }}"
          body: |
            Beta of PR #${{ env.PR }} (${{ steps.pr.outputs.title }})
            built from ${{ steps.pr.outputs.sha }} on a maintainer's `/beta` request.

            Install it from the app: **Settings → Updates → PR #${{ env.PR }}**.
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          files: |
            retouch-armv7l
            SHA256SUMS

      - name: Comment install hint
        run: |
          gh pr comment "$PR" --body "🧪 Beta built for this PR. On a speaker already running ReTouch, open the app → **Settings → Updates**, pick **PR #${PR}**, and update — no computer needed. Comment \`/beta\` again to rebuild after new pushes; the beta is removed when the PR closes."

  # Tear down the beta when the PR closes so stale prereleases don't pile up.
  cleanup:
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete the beta prerelease + tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: beta-pr-${{ github.event.number }}
        run: |
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes || \
            echo "no beta release for $TAG (nothing to clean up)"
