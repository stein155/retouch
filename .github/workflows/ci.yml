name: CI

# Builds the web UI and the agent on every push / PR so the frontend assets are
# always produced by CI (they are no longer committed to the repo). The built
# bundle lands in internal/web/dist, which the Go binary embeds via go:embed, so
# the agent build below also verifies the embed wiring is intact.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build web UI
        working-directory: frontend
        run: |
          npm ci
          npm run build   # outputs to ../internal/web/dist (embedded by go:embed)

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Vet & test (host arch)
        run: |
          go vet ./...
          go test ./...

      - name: Build agent (armv7l, embeds the web UI)
        env:
          GOOS: linux
          GOARCH: arm
          GOARM: '7'
          CGO_ENABLED: '0'
        run: go build -o /dev/null .
