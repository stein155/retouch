<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>ReTouch</title>
    <!-- iOS home-screen shortcut label. Overwritten at runtime with the radio's
         own name (see HomePage) so a pinned tile reads e.g. "Keuken". -->
    <meta name="apple-mobile-web-app-title" content="ReTouch" />
    <meta name="theme-color" content="#f1e6cb" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ReTouch" />
    <!-- Critical base layout, inline so it applies before the JS bundle mounts
         and styled-components injects GlobalStyle. Without it the body briefly
         shows the UA margin + a window scrollbar, so the centred app frame jumps
         from narrow to wider on refresh. Keep in sync with GlobalStyle. -->
    <!-- Apply the saved colour scheme before the first paint so a dark-mode
         device never flashes the light theme. Mirrors theme/themeMode.js — keep
         the storage key + resolution in sync with it. -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem('retouch-theme');
          var mode = (m === 'light' || m === 'dark') ? m : 'system';
          var dark = mode === 'dark' || (mode === 'system' && window.matchMedia
            && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', dark ? '#17130f' : '#f1e6cb');
        } catch (e) { /* private mode / no matchMedia: default to light */ }
      })();
    </script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #f1e6cb;
        height: 100dvh;
        overflow: hidden;
        overscroll-behavior: none;
      }
      body {
        background: linear-gradient(176deg, #f1e6cb 0%, #efe1c1 42%, #e7d7b2 100%);
        background-attachment: fixed;
      }
      html[data-theme='dark'], html[data-theme='dark'] body { background: #17130f; }
      html[data-theme='dark'] body {
        background: linear-gradient(176deg, #211a14 0%, #17130f 48%, #100c09 100%);
        background-attachment: fixed;
      }
      @media (min-width: 720px) {
        body { display: grid; place-items: center; }
      }

      /* Launch skeleton — the app shell painted as static HTML so the first
         frame shows Radio's layout (header + preset grid + player) instead of a
         blank cream screen while the JS bundle loads. React replaces #root's
         contents on mount, swapping this for the live (also-skeletoned) UI.
         Keep the shapes/tokens in sync with AppShell + PresetTile + MiniPlayer. */
      #root:has(.ls) { height: 100%; }
      .ls {
        --bg: #f1e6cb; --surface: #fff; --surface-3: #ead9b3; --accent-soft: #f4dcc6;
        --ink: #1f1814; --shimmer: rgba(255,255,255,.55);
        --shadow-sm: 0 1px 2px rgba(31,24,20,.05), 0 0 0 1px rgba(31,24,20,.04);
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        color: var(--ink);
        width: 460px; max-width: 100%; height: 100dvh; margin: 0 auto;
        display: flex; flex-direction: column; overflow: hidden;
        background: var(--bg); position: relative;
      }
      html[data-theme='dark'] .ls {
        --bg: #17130f; --surface: #221d18; --surface-3: #362c23; --accent-soft: #3b2a1f;
        --ink: #f3e9db; --shimmer: rgba(255,255,255,.06);
        --shadow-sm: 0 1px 2px rgba(0,0,0,.4), 0 0 0 1px rgba(0,0,0,.3);
      }
      @media (min-width: 720px) {
        .ls { height: min(880px, calc(100dvh - 64px)); max-height: 920px; border-radius: 36px;
              box-shadow: 0 0 0 1px rgba(31,24,20,.06), 0 30px 60px -20px rgba(31,24,20,.22); }
      }
      .ls-hdr { display: flex; align-items: center; justify-content: space-between;
                padding: max(26px, calc(env(safe-area-inset-top) + 10px)) 24px 8px; }
      .ls-brand { display: flex; align-items: center; gap: 12px; }
      .ls-blob { width: 40px; height: 40px; border-radius: 50%; background: var(--accent-soft);
                 overflow: hidden; box-shadow: 0 1px 4px rgba(31,24,20,.10), 0 0 0 1px rgba(31,24,20,.06); }
      .ls-blob img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .ls-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
      .ls-gear { width: 40px; height: 40px; border-radius: 50%; background: var(--surface);
                 box-shadow: var(--shadow-sm); }
      .ls-sect { padding: 14px 22px 0; }
      .ls-sect-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
      .ls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .ls-tile { background: var(--surface); border-radius: 20px; aspect-ratio: 1.1 / 1; min-height: 116px;
                 padding: 14px; box-shadow: var(--shadow-sm);
                 display: flex; flex-direction: column; justify-content: space-between; }
      .ls-browse { display: flex; align-items: center; gap: 14px; background: var(--surface); border-radius: 20px;
                   padding: 14px 16px; box-shadow: var(--shadow-sm); margin-top: 6px; }
      .ls-mp { position: absolute; left: 14px; right: 14px; bottom: max(14px, calc(env(safe-area-inset-bottom) + 8px));
               background: var(--surface); border-radius: 22px; padding: 12px;
               box-shadow: 0 18px 40px -16px rgba(31,24,20,.22), 0 0 0 1px rgba(31,24,20,.05); }
      .ls-mp-top { display: flex; align-items: center; gap: 12px; }
      .ls-mp-meta { flex: 1; min-width: 0; }
      .ls-mp-vol { display: flex; align-items: center; gap: 12px; margin-top: 12px; padding: 0 2px; }
      .ls-sk { display: block; background-color: var(--surface-3);
               background-image: linear-gradient(90deg, transparent 0, var(--shimmer) 50%, transparent 100%);
               background-size: 150% 100%; background-repeat: no-repeat; border-radius: 9px;
               animation: ls-shimmer 1.4s ease-in-out infinite; }
      @keyframes ls-shimmer { from { background-position: -150% 0; } to { background-position: 150% 0; } }
      @media (prefers-reduced-motion: reduce) { .ls-sk { animation: none; background-image: none; } }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Serif+Display&family=JetBrains+Mono:wght@500;700&family=Caveat:wght@600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <!-- Static launch skeleton; see .ls styles above. Replaced by React on mount. -->
      <div class="ls" aria-hidden="true">
        <div class="ls-hdr">
          <div class="ls-brand">
            <span class="ls-blob"><img src="/badge.png" alt="" width="40" height="40" /></span>
            <span class="ls-title">Radio</span>
          </div>
          <span class="ls-gear"></span>
        </div>
        <div class="ls-sect">
          <div class="ls-sect-head">
            <span class="ls-sk" style="width:120px;height:18px;border-radius:6px"></span>
            <span class="ls-sk" style="width:64px;height:12px;border-radius:6px"></span>
          </div>
          <div class="ls-grid">
            <div class="ls-tile"><span class="ls-sk" style="width:44px;height:44px;border-radius:12px"></span><span class="ls-sk" style="width:70%;height:16px;border-radius:6px"></span></div>
            <div class="ls-tile"><span class="ls-sk" style="width:44px;height:44px;border-radius:12px"></span><span class="ls-sk" style="width:70%;height:16px;border-radius:6px"></span></div>
            <div class="ls-tile"><span class="ls-sk" style="width:44px;height:44px;border-radius:12px"></span><span class="ls-sk" style="width:70%;height:16px;border-radius:6px"></span></div>
            <div class="ls-tile"><span class="ls-sk" style="width:44px;height:44px;border-radius:12px"></span><span class="ls-sk" style="width:70%;height:16px;border-radius:6px"></span></div>
            <div class="ls-tile"><span class="ls-sk" style="width:44px;height:44px;border-radius:12px"></span><span class="ls-sk" style="width:70%;height:16px;border-radius:6px"></span></div>
            <div class="ls-tile"><span class="ls-sk" style="width:44px;height:44px;border-radius:12px"></span><span class="ls-sk" style="width:70%;height:16px;border-radius:6px"></span></div>
          </div>
        </div>
        <div class="ls-sect">
          <div class="ls-browse">
            <span class="ls-sk" style="width:42px;height:42px;border-radius:50%;flex-shrink:0"></span>
            <span style="flex:1"><span class="ls-sk" style="width:50%;height:15px;border-radius:6px;display:block"></span><span class="ls-sk" style="width:70%;height:12px;border-radius:6px;display:block;margin-top:7px"></span></span>
            <span class="ls-sk" style="width:32px;height:32px;border-radius:50%;flex-shrink:0"></span>
          </div>
        </div>
        <div class="ls-mp">
          <div class="ls-mp-top">
            <span class="ls-sk" style="width:52px;height:52px;border-radius:14px;flex-shrink:0"></span>
            <span class="ls-mp-meta"><span class="ls-sk" style="width:60%;height:15px;border-radius:6px;display:block"></span><span class="ls-sk" style="width:40%;height:12px;border-radius:6px;display:block;margin-top:8px"></span></span>
            <span class="ls-sk" style="width:42px;height:42px;border-radius:50%;flex-shrink:0"></span>
          </div>
          <div class="ls-mp-vol">
            <span class="ls-sk" style="width:28px;height:28px;border-radius:8px;flex-shrink:0"></span>
            <span class="ls-sk" style="flex:1;height:8px;border-radius:99px"></span>
            <span class="ls-sk" style="width:30px;height:12px;border-radius:6px;flex-shrink:0"></span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
